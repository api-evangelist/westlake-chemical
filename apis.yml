name: Westlake Chemical
description: >-
  Westlake Chemical (now Westlake Corporation) is a global manufacturer and supplier
  of petrochemicals, polymers, building products, and specialty chemicals. The company
  produces ethylene, polyethylene, PVC, chlor-alkali, epoxy resins, and fabricated
  building products serving packaging, healthcare, automotive, consumer goods, and
  construction markets worldwide.
