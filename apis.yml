  - type: Features
    data:
      - name: Petrochemicals
        description: >-
          Production of ethylene, polyethylene, and chlor-alkali products for
          industrial and consumer markets globally.
      - name: Specialty Chemicals
        description: >-
          Epoxy resins and composites for high-performance applications in
          electronics, aerospace, and infrastructure.
      - name: Building Products
        description: >-
          PVC pipe and fittings, vinyl siding, windows, and related infrastructure
          products for construction markets.
      - name: Polymers
        description: >-
          PVC, vinyl chloride monomer, and recycled plastic materials for packaging,
          healthcare, and automotive industries.
      - name: Global Distribution
        description: >-
          Manufacturing facilities and distribution networks across North America,
          Europe, and Asia supporting global supply chains.
  - type: UseCases
    data:
      - name: Packaging Materials
        description: >-
          Supply of polyethylene and PVC resins for flexible and rigid packaging
          applications in food, beverage, and consumer goods.
      - name: Construction Materials
        description: >-
          PVC pipe systems, vinyl building products, and composites for residential
          and commercial construction projects.
      - name: Healthcare Products
        description: >-
          Medical-grade PVC and specialty polymers for tubing, bags, and devices
          used in healthcare settings.
      - name: Automotive Components
        description: >-
          Engineered polymers and epoxy composites for lightweight automotive
          parts and structural components.
  - type: Integrations
    data:
      - name: SAP ERP
        description: >-
          Enterprise resource planning integration for supply chain management,
          order processing, and procurement workflows.
      - name: EDI Trading Partners
        description: >-
          Electronic Data Interchange connectivity for B2B order management and
          supplier/customer transaction processing.
